[tool.pytest.ini_options]
pythonpath = "."
addopts = "-p no:warnings"

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "UP", "B"]
exclude = [
    "alembic",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.taskipy.tasks]
api = "uvicorn src.auth.router:app --reload"
test = "pytest -v"
lint = "ruff check ."
format = "ruff format ."