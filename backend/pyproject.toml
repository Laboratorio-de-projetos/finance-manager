[tool.pytest.ini_options]
pythonpath = "."
addopts = "-p no:warnings"

[tool.ruff]
line-length = 79
extend-exclude = ['migrations']
exclude = [
    "alembic",
]

[tool.ruff.lint]
preview = true
select = ['I', 'F', 'E', 'W', 'PL', 'PT']

[tool.ruff.format]
preview = true
quote-style = 'single'

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.taskipy.tasks]
api = "uvicorn src.auth.router:app --reload"
test = "pytest -v"
lint = "ruff check ."
format = "ruff format ."