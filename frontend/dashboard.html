<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cálculo de Aumento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="menuLateral">
      <button id="btn-sidebar">☰</button>

      <aside class="sidebar">
        <ul>
          <li><a href="#">Menu Principal</a></li>
          <li><a href="#">Calendário</a></li>
          <li><a href="#">Relatórios</a></li>
        </ul>
      </aside>
    </div>

    <section class="menuPrincipal">
      <h1>Minhas movimentações</h1>

      <div class="filtros">
        <div class="campo-filtro">
          <label for="dataInicial">Data inicial</label>
          <input type="date" id="dataInicial" />
        </div>

        <div class="campo-filtro">
          <label for="dataFinal">Data final</label>
          <input type="date" id="dataFinal" />
        </div>

        <button type="button" id="btnPesquisar">Pesquisar</button>
        <button type="button" id="btnIncluirMov">Incluir</button>
      </div>

      <div class="modal" id="modalMovimentacao">
        <div class="modal-content">
          <h2>Nova Movimentação</h2>

          <div class="form-group">
            <label for="valorMov">Valor</label>
            <input
              type="number"
              id="valorMov"
              placeholder="R$ 0,00"
              step="0.01"
              required
            />
          </div>

          <div class="form-group">
            <label for="dataInclusaoMov">Data</label>
            <input type="date" id="dataInclusaoMov" required />
          </div>

          <div class="form-group">
            <label for="tipo">Tipo</label>
            <select id="tipo" required>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>

          <div class="form-group">
            <label for="tag">Tag</label>
            <select id="tag" required>
              <option value="alimentacao">Alimentação</option>
              <option value="transporte">Transporte</option>
              <option value="moradia">Moradia</option>
              <option value="lazer">Lazer</option>
              <option value="saude">Saúde</option>
              <option value="outros">Outros</option>
            </select>
          </div>

          <div class="modal-buttons">
            <button class="btn-cancelar" id="btnCancelarInclusaoMov">
              Cancelar
            </button>
            <button class="btn-salvar" id="btnSalvarInclusaoMov">Salvar</button>
          </div>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Saldo Atual</h3>
          <p id="saldo">R$ 0,00</p>
        </div>

        <div class="card">
          <h3>Entradas</h3>
          <p id="entradas">R$ 0,00</p>
        </div>

        <div class="card">
          <h3>Saídas</h3>
          <p id="saidas">R$ 0,00</p>
        </div>
      </div>

      <div class="graficos">
        <div class="grafico-card">
          <canvas id="graficoCategorias"></canvas>
        </div>

        <div class="grafico-card">
          <canvas id="graficoSaldo"></canvas>
        </div>
      </div>

      <div id="resultado"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
